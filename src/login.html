<!DOCTYPE html>
<html lang="zh-CN" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RM520N WebUI - 登录</title>
    <link rel="stylesheet" href="/style.css">
    <meta name="theme-color" content="#5e72e4">
</head>

<body class="bg-[#080a0f] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- 沉浸式 Argon 背景壁纸罩 -->
    <div class="login-wallpaper-container"></div>

    <!-- 登录卡片 -->
    <div class="w-full max-w-md argon-card relative z-10 border border-white/10 shadow-2xl rounded-2xl p-8 bg-[#151922]/90 backdrop-blur-xl">

        <!-- Branding 标识 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center space-x-3 mb-2">
                <span class="text-3xl font-black tracking-wider text-indigo-500">Argon</span>
                <span class="text-xs bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 px-2 py-0.5 rounded font-bold tracking-wider">RM520N</span>
            </div>
            <p class="text-xs text-slate-400 tracking-wider uppercase">5G NR Cellular Control Center</p>
        </div>

        <!-- 错误提示框 -->
        <div id="error_alert" class="hidden mb-6 p-3 bg-red-500/10 border border-red-500/30 text-red-400 text-xs rounded-lg text-center font-medium">
            密码错误，请重新输入
        </div>

        <!-- 登录表单 -->
        <form id="login_form" class="space-y-5" onsubmit="handleLogin(event)">
            <div class="space-y-1.5">
                <label for="username" class="block text-xs font-semibold text-slate-300 uppercase tracking-wider">用户名 (Username)</label>
                <div class="relative">
                    <input id="username" type="text" required placeholder="请输入用户名..."
                        class="argon-input w-full bg-[#0c0f16]/80 border border-slate-700/80 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                </div>
            </div>
            <div class="space-y-1.5">
                <label for="password" class="block text-xs font-semibold text-slate-300 uppercase tracking-wider">密码 (Password)</label>
                <div class="relative">
                    <input id="password" type="password" required placeholder="请输入密码..."
                        class="argon-input w-full bg-[#0c0f16]/80 border border-slate-700/80 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                </div>
            </div>

            <button type="submit" id="submit_btn"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl text-sm transition-all duration-200 active:scale-95 shadow-lg shadow-indigo-600/30 cursor-pointer">
                解 锁 进 入
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-800/80 pt-4">
            <span class="text-[11px] text-slate-500">凭证通过环境变量 <code class="text-indigo-400">CREDIT_HASH</code> 配置，值为 <code class="text-indigo-400">sha256(username:password)</code></span>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submit_btn');
            const errorAlert = document.getElementById('error_alert');

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (!username || !password) return;

            submitBtn.disabled = true;
            submitBtn.innerText = '正在验证凭证...';
            errorAlert.classList.add('hidden');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    window.location.href = '/';
                } else {
                    errorAlert.innerText = data.msg || '身份验证失败';
                    errorAlert.classList.remove('hidden');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (err) {
                errorAlert.innerText = '网络请求失败，请检查服务状态';
                errorAlert.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = '解 锁 进 入';
            }
        }
    </script>
</body>

</html>
