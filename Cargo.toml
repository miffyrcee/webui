[package]
name = "quectel-webui"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { version = "0.8.9", features = ["ws", "macros"] }
tokio = { version = "1.52.3", features = ["full"] }
tokio-serial = "5.4.5"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
futures = "0.3.32"
sysinfo = "0.39.2"
chrono = "0.4.44"
nom = "8"
