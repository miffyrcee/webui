[package]
name = "quectel-webui"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { version = "0.8.9", features = ["ws", "macros"] }
tokio = { version = "1.52.3", features = ["full"] }
tokio-serial = "5.4.5" # 用于 AT 指令串口通信
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
rust-embed = "8.11.0" # 将前端文件嵌入二进制
futures = "0.3.32"
mime_guess = "2.0.5"
askama = "0.16.0"
sysinfo = "0.39.2"
chrono = "0.4.44"
nom = "8"
