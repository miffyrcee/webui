<!DOCTYPE html>
<html lang="zh-CN" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - RM520N 5G WebUI</title>
    <link rel="stylesheet" href="/style.css">
    <meta name="theme-color" content="#f8f9fe" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#080b14" media="(prefers-color-scheme: dark)">
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; user-select: none;
        }

        /* 登录卡片基础与暗色样式修复 */
        .argon-login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 1.5rem;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(94, 114, 228, 0.15);
            transition: all 0.3s ease;
        }

        /* 亮色模式样式覆盖 */
        html:not(.dark) body {
            background: #f4f5f7;
        }
        html:not(.dark) .argon-login-card {
            background: rgba(255, 255, 255, 0.85) !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08), 0 0 60px rgba(94, 114, 228, 0.08) !important;
        }
        html:not(.dark) .argon-login-card input {
            background-color: #ffffff !important;
            border-color: #e2e8f0 !important;
            color: #1e293b !important;
        }
        html:not(.dark) .argon-login-card input:focus {
            border-color: #5e72e4 !important;
            box-shadow: 0 0 0 3px rgba(94, 114, 228, 0.15) !important;
        }
        html:not(.dark) .argon-login-card input::placeholder {
            color: #94a3b8 !important;
        }
        html:not(.dark) .argon-login-card label {
            color: #64748b !important;
        }
        html:not(.dark) .argon-login-card .border-t {
            border-color: rgba(0, 0, 0, 0.06) !important;
        }
        html:not(.dark) #theme_toggle {
            background: rgba(0, 0, 0, 0.05) !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
            color: #64748b !important;
        }
        html:not(.dark) #theme_toggle:hover {
            background: rgba(0, 0, 0, 0.1) !important;
            color: #1e293b !important;
        }
    </style>
</head>

<body class="font-sans">

    <!-- 背景几何渐变容器 -->
    <div class="login-wallpaper-container"></div>

    <!-- 主题切换按钮 -->
    <button id="theme_toggle" type="button" title="切换白天/夜晚模式"
        class="fixed top-5 right-5 z-50 p-2.5 rounded-xl bg-white/10 dark:bg-white/10 border border-white/15 dark:border-white/10 text-slate-300 dark:text-slate-400 hover:bg-white/20 hover:text-white transition-all duration-200 cursor-pointer">
        <svg aria-hidden="true" class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
        <svg aria-hidden="true" class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
    </button>

    <!-- 登录毛玻璃卡片 -->
    <div class="argon-login-card mx-4">

        <!-- Brand Header -->
        <div class="text-center mb-7">
            <div class="inline-flex items-center justify-center gap-2 mb-1.5">
                <span class="text-[26px] font-black tracking-wider bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent">Argon</span>
                <span class="text-[10px] font-bold tracking-wider px-2 py-0.5 rounded bg-indigo-500/15 border border-indigo-500/30 text-indigo-400">RM520N</span>
            </div>
            <p class="text-[11px] font-semibold tracking-[1.5px] uppercase text-slate-400 dark:text-slate-400 m-0">5G NR CELLULAR CONTROL CENTER</p>
        </div>

        <!-- 登录表单 -->
        <form id="login_form" onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label for="username" class="block text-[11px] font-semibold tracking-wider uppercase text-slate-300 dark:text-slate-400 mb-1.5">用户名</label>
                <input id="username" type="text" value="admin" required placeholder="请输入用户名"
                    class="w-full box-border bg-[#1a202c] border border-[#2d3748] text-white rounded-xl px-3.5 py-3 text-[14px] outline-none transition-all duration-200 placeholder:text-[#525f7f] focus:border-indigo-500 focus:bg-[#20293a] focus:ring-2 focus:ring-indigo-500/20" />
            </div>

            <div>
                <label for="password" class="block text-[11px] font-semibold tracking-wider uppercase text-slate-300 dark:text-slate-400 mb-1.5">密码</label>
                <input id="password" type="password" required placeholder="••••••••"
                    class="w-full box-border bg-[#1a202c] border border-[#2d3748] text-white rounded-xl px-3.5 py-3 text-[14px] outline-none transition-all duration-200 placeholder:text-[#525f7f] focus:border-indigo-500 focus:bg-[#20293a] focus:ring-2 focus:ring-indigo-500/20" />
            </div>

            <!-- 错误提示 -->
            <div id="error_msg" class="hidden text-center text-[12px] py-2.5 px-3 rounded-lg bg-red-500/15 border border-red-500/30 text-red-400"></div>

            <!-- 登录按钮 -->
            <button id="login_btn" type="submit"
                class="w-full h-[46px] bg-gradient-to-r from-indigo-600 to-purple-600 border-none rounded-xl text-white text-[14px] font-bold tracking-[2px] cursor-pointer shadow-lg shadow-indigo-600/35 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-indigo-600/50 active:translate-y-0 disabled:opacity-60 disabled:cursor-not-allowed mt-1">
                解 锁 进 入
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-6 pt-4 border-t border-white/10 text-center text-[11px] text-slate-400 leading-relaxed">
            凭证通过环境变量 <code class="text-indigo-400 font-mono">WEBUI_USERNAME</code> / <code class="text-indigo-400 font-mono">WEBUI_PASSWORD</code> 配置<br>
            用户名与密码均加密传输
        </div>
    </div>

    <!-- Challenge-Response 登录逻辑 -->
    <script>
        function sha256Pure(data) {
            const K = new Uint32Array([
                0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
            ]);
            function rrot(x, n) { return (x >>> n) | (x << (32 - n)); }
            const len = data.length, ml = len * 8;
            let paddedLen = (((len + 9 + 63) >>> 6) << 6);
            const padded = new Uint8Array(paddedLen);
            padded.set(data);
            padded[len] = 0x80;
            const dv = new DataView(padded.buffer);
            dv.setUint32(paddedLen - 4, ml >>> 0, false);
            dv.setUint32(paddedLen - 8, Math.floor(ml / 0x100000000), false);
            let H0 = 0x6a09e667, H1 = 0xbb67ae85, H2 = 0x3c6ef372, H3 = 0xa54ff53a;
            let H4 = 0x510e527f, H5 = 0x9b05688c, H6 = 0x1f83d9ab, H7 = 0x5be0cd19;
            const W = new Uint32Array(64);
            for (let i = 0; i < paddedLen; i += 64) {
                for (let t = 0; t < 16; t++) W[t] = dv.getUint32(i + t * 4, false);
                for (let t = 16; t < 64; t++) {
                    const s0 = rrot(W[t-15], 7) ^ rrot(W[t-15], 18) ^ (W[t-15] >>> 3);
                    const s1 = rrot(W[t-2], 17) ^ rrot(W[t-2], 19) ^ (W[t-2] >>> 10);
                    W[t] = (W[t-16] + s0 + W[t-7] + s1) >>> 0;
                }
                let a = H0, b = H1, c = H2, d = H3, e = H4, f = H5, g = H6, h = H7;
                for (let t = 0; t < 64; t++) {
                    const S1 = rrot(e, 6) ^ rrot(e, 11) ^ rrot(e, 25);
                    const ch = (e & f) ^ ((~e) & g);
                    const temp1 = (h + S1 + ch + K[t] + W[t]) >>> 0;
                    const S0 = rrot(a, 2) ^ rrot(a, 13) ^ rrot(a, 22);
                    const maj = (a & b) ^ (a & c) ^ (b & c);
                    const temp2 = (S0 + maj) >>> 0;
                    h = g; g = f; f = e; e = (d + temp1) >>> 0;
                    d = c; c = b; b = a; a = (temp1 + temp2) >>> 0;
                }
                H0 = (H0 + a) >>> 0; H1 = (H1 + b) >>> 0; H2 = (H2 + c) >>> 0; H3 = (H3 + d) >>> 0;
                H4 = (H4 + e) >>> 0; H5 = (H5 + f) >>> 0; H6 = (H6 + g) >>> 0; H7 = (H7 + h) >>> 0;
            }
            function hex32(v) { return (v >>> 0).toString(16).padStart(8, '0'); }
            return hex32(H0)+hex32(H1)+hex32(H2)+hex32(H3)+hex32(H4)+hex32(H5)+hex32(H6)+hex32(H7);
        }

        async function sha256(str) {
            const buf = new TextEncoder().encode(str);
            if (typeof crypto !== 'undefined' && crypto.subtle) {
                const hashBuf = await crypto.subtle.digest('SHA-256', buf);
                return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
            }
            return sha256Pure(buf);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('login_btn');
            const errorBox = document.getElementById('error_msg');

            if (!username || !password) { showError('请填写用户名和密码'); return; }
            submitBtn.disabled = true;
            submitBtn.innerText = '正在验证...';
            hideError();

            try {
                const nonceResp = await fetch('/api/get_nonce');
                if (!nonceResp.ok) throw new Error('无法获取服务端随机数');
                const { nonce } = await nonceResp.json();
                const passHash = await sha256(password);
                const response = await sha256(nonce + username + passHash);
                const loginResp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, nonce, response })
                });
                const result = await loginResp.json();
                if (loginResp.ok && result.success) {
                    window.location.href = '/';
                } else {
                    showError('用户名或密码错误');
                }
            } catch (err) {
                showError('登录响应异常: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = '解 锁 进 入';
            }
        }

        function showError(msg) {
            const el = document.getElementById('error_msg');
            if (el) { el.innerText = msg; el.classList.remove('hidden'); }
        }
        function hideError() {
            const el = document.getElementById('error_msg');
            if (el) el.classList.add('hidden');
        }

        function initTheme() {
            const html = document.documentElement;
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) html.classList.add('dark');
            else html.classList.remove('dark');
            document.getElementById('theme_toggle')?.addEventListener('click', () => {
                html.classList.toggle('dark');
                localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            });
        }
        initTheme();
    </script>
</body>
</html>
